name: .NET Desktop

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SubtitleHider.sln

      - name: Build
        run: dotnet build SubtitleHider.sln --no-restore --configuration Release

      - name: Publish framework-dependent
        run: |
          dotnet publish SubtitleHider/SubtitleHider.csproj `
            -c Release -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -o ./publish

      - name: Publish self-contained
        run: |
          dotnet publish SubtitleHider/SubtitleHider.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ./publish-full

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubtitleHider-FrameworkDependent
          path: ./publish/SubtitleHider.exe

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubtitleHider-SelfContained
          path: ./publish-full/SubtitleHider.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download framework-dependent artifact
        uses: actions/download-artifact@v4
        with:
          name: SubtitleHider-FrameworkDependent
          path: ./artifacts/framework

      - name: Download self-contained artifact
        uses: actions/download-artifact@v4
        with:
          name: SubtitleHider-SelfContained
          path: ./artifacts/full

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/framework/SubtitleHider.exe
            ./artifacts/full/SubtitleHider.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
